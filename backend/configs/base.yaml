# Configuration for training the ChimeraAgent

# Environment settings
env_name: "MountainCar-v0"

# Agent settings
default_agent_id_prefix: "Kymera-"
force_new_agent: false # If true, ignores any saved state for the agent

# Agent History Settings
agent_history:
  max_snapshots: 100 # The maximum number of version snapshots to keep.
  base_snapshot_interval: 10 # How often to save a full "base" snapshot.

# Main training settings
max_training_steps: 2000000 # The total number of environment steps to train for.

# Agent architecture and hyperparameters
agent_config:
  embedding_dim: 512 # The fixed-size vector dimension produced by any cortex.
  max_action_dim: 256
  latent_dim: 128
  hidden_dim: 512
  hyperparams:
    learning_rate: 0.0003
    gamma: 0.99
    batch_size: 16
    buffer_capacity: 100000
    value_loss_weight: 1.0 # Increased from default 0.5 to stabilize critic
    # Vitals-based reward shaping
    low_energy_threshold: 0.2 # 20%
    low_energy_penalty: -10.0
    # Epsilon-greedy exploration
    epsilon_start: 0.9
    epsilon_end: 0.05
    epsilon_decay_steps: 200000
    burnin_steps: 1000
    sequence_length: 20
    policy_train_frequency: 10
    # Training Schedules
    imagination_horizon_start: 5
    imagination_horizon_end: 10
    imagination_horizon_schedule_steps: 10000
    entropy_coef_start: 0.01
    entropy_coef_end: 0.001
    entropy_coef_schedule_steps: 20000
    use_internal_reward: false
    use_stag_in_ac_loss: true # If true, the STAG context vector is used in the actor-critic loss.
    # Phased Training for STAG
    world_model_pretrain_steps: 1000 # Reduced to engage STAG earlier.
    stag_update_frequency: 50 # Increased to allow STAG to stabilize.
    # STAG Graph Growth Management
    gng_pruning_frequency: 1000 # Prune low-utility nodes every N training steps.
    gng_min_utility_threshold: 0.1 # Prune nodes with utility below this threshold.
    gng_pruning_grace_period: 500 # Number of iterations before a new node is eligible for pruning.
    gng_utility_floor: 0.1
    gng_utility_clip: 10.0
    gng_faiss_rebuild_interval: 100
    # Adaptive GNG Learning Rate
    gng_learning_rate_decay: 0.9999
    gng_winner_learning_rate_initial: 0.8
    gng_neighbor_learning_rate_initial: 0.1
    # World Model Regularization
    world_model_weight_decay: 1.0e-6 # L2 penalty for the world model optimizer
    free_bits: 1.0 # KL balancing parameter
    # Latent Planner (CEM)
    cem_plan_horizon: 12
    cem_num_samples: 500 # Reduced for performance
    cem_top_k: 50 # Reduced for performance
    cem_iterations: 5 # Reduced for performance
    low_level_plan_frequency: 10 # Plan every 10 steps
    use_planner: true
    high_level_replan_frequency: 100 # Replans every 100 steps
    # Prioritized Experience Replay
    per_alpha: 0.6
    per_beta_start: 0.4
    per_beta_frames: 100000
    # World Model Ensemble
    num_ensemble_models: 3
    uncertainty_penalty_weight: 0.1
    # Goal-Conditioning
    goal_dim: 512 # Should match the hidden_dim for now
    # Representation Learning
    contrastive_loss_weight: 0.1
    use_data_augmentation: true
    # Successor Features
    sf_learning_rate: 0.01
    sf_dimension: 64
    # Hindsight Experience Replay
    her_replay_strategy: 'future'
    her_replay_k: 4
