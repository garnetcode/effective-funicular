# Configuration for training the ChimeraAgent

# Environment settings
env_name: "CartPole-v1"

# Agent settings
default_agent_id_prefix: "agent-"
force_new_agent: false # If true, ignores any saved state for the agent

# Main training settings
episodes_per_env: 100 # How many episodes each parallel agent should run

# Language Model (LLM) Integration
language_model:
  enabled: true # Toggle the language capabilities on/off
  model_id: "google/gemma-3-1b-it"

# Agent architecture and hyperparameters
agent_config:
  latent_dim: 64
  hidden_dim: 128
  hyperparams:
    learning_rate: 0.005
    gamma: 0.99
    batch_size: 32
    buffer_capacity: 10000
