# Configuration for training the ChimeraAgent

# Environment settings
env_name: "MountainCar-v0"

# Agent settings
default_agent_id_prefix: "Kymera-"
force_new_agent: false # If true, ignores any saved state for the agent

# Agent History Settings
agent_history:
  max_snapshots: 100 # The maximum number of version snapshots to keep.
  base_snapshot_interval: 10 # How often to save a full "base" snapshot.

# Main training settings
episodes_per_env: 20 # How many episodes each parallel agent should run

# Language Model (LLM) Integration
language_model:
  enabled: true # Toggle the language capabilities on/off
  generation_model_id: "gemma3:1b" # Model for generating text responses
  embedding_model_id: "nomic-embed-text" # Model for creating embeddings
  embedding_dim: 768 # The dimension of the embeddings produced by the model
  api_base: "http://localhost:11434/v1" # Ollama API endpoint
  local_model_path: "" # Set to empty to avoid conflict with API usage

# Agent architecture and hyperparameters
agent_config:
  max_obs_dim: 2048
  max_action_dim: 256
  latent_dim: 64
  hidden_dim: 128
  hyperparams:
    learning_rate: 0.0003
    gamma: 0.99
    batch_size: 32
    buffer_capacity: 10000
    value_loss_weight: 1.0 # Increased from default 0.5 to stabilize critic
    # Vitals-based reward shaping
    low_energy_threshold: 0.2 # 20%
    low_energy_penalty: -10.0
    # Epsilon-greedy exploration
    epsilon_start: 0.9
    epsilon_end: 0.05
    epsilon_decay_steps: 20000
    burnin_steps: 1000
    policy_train_frequency: 10
    use_internal_reward: false
    use_stag_in_ac_loss: true # If true, the STAG context vector is used in the actor-critic loss.
    # Phased Training for STAG
    world_model_pretrain_steps: 5000 # Number of steps to train WM before STAG activates.
    stag_update_frequency: 10 # Update STAG every N steps.
    # STAG Graph Growth Management
    gng_pruning_frequency: 1000 # Prune low-utility nodes every N training steps.
    gng_min_utility_threshold: 0.1 # Prune nodes with utility below this threshold.
